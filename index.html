<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="셀렉트노트">
<meta name="theme-color" content="#1C1B19">
<title>셀렉트노트 — PANICALE</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#FAF8F4;
    --bg-elevated:#FFFFFF;
    --ink:#1C1B19;
    --ink-soft:#6B6358;
    --line:#E6E0D5;
    --accent:#8B6F4E;
    --accent-soft:#F0E8DC;
    --warn:#C2410C;
    --ok:#3F6E52;
    --ok-soft:#E5EFE9;
    --radius:14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
    color:var(--ink);
    overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
  }
  #app{min-height:100%;display:flex;flex-direction:column;}
  input,select,textarea,button{font-family:inherit; font-size:16px;}
  button{cursor:pointer;}
  ::-webkit-scrollbar{display:none;}

  /* ---------- PIN SCREEN ---------- */
  .pin-screen{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;gap:28px;
  }
  .pin-mark{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;font-size:15px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);
  }
  .pin-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;}
  .pin-dots{display:flex;gap:14px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--line);background:transparent;transition:all .15s;}
  .pin-dot.filled{background:var(--accent);border-color:var(--accent);}
  .pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:14px;}
  .pin-key{
    width:72px;height:72px;border-radius:50%;border:1px solid var(--line);background:var(--bg-elevated);
    font-size:24px;font-weight:600;color:var(--ink);
  }
  .pin-key:active{background:var(--accent-soft);}
  .pin-key.ghost{border:none;background:none;}
  .pin-error{color:var(--warn);font-size:14px;height:18px;}

  /* ---------- TOP BAR ---------- */
  .topbar{
    position:sticky;top:0;z-index:20;
    padding:calc(12px + var(--safe-top)) 16px 12px;
    background:var(--bg);border-bottom:1px solid var(--line);
  }
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
  .brand{display:flex;flex-direction:column;line-height:1.1;}
  .brand-eyebrow{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}
  .brand-name{font-size:15px;font-weight:700;letter-spacing:-0.02em;}
  .sync-pill{
    display:flex;align-items:center;gap:6px;
    padding:7px 12px;border-radius:999px;font-size:13px;font-weight:600;
    border:1px solid var(--line);background:var(--bg-elevated);white-space:nowrap;
  }
  .sync-pill.pending{color:var(--warn);border-color:#F0CFC0;background:#FBF1EB;}
  .sync-pill.synced{color:var(--ok);border-color:#CFE0D5;background:var(--ok-soft);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .sync-dot.pulse{animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .search-row{display:flex;gap:8px;}
  .search-box{
    flex:1;display:flex;align-items:center;gap:8px;
    background:var(--bg-elevated);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;
  }
  .search-box input{border:none;outline:none;background:none;flex:1;color:var(--ink);}
  .search-box input::placeholder{color:var(--ink-soft);}
  .filter-toggle{
    border:1px solid var(--line);background:var(--bg-elevated);border-radius:10px;
    padding:10px 14px;font-size:13px;font-weight:600;color:var(--ink-soft);white-space:nowrap;
  }
  .filter-toggle.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  .filter-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .chip{
    padding:6px 13px;border-radius:999px;font-size:13px;font-weight:600;
    border:1px solid var(--line);background:var(--bg-elevated);color:var(--ink-soft);
  }
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  /* ---------- LIST ---------- */
  .list-wrap{flex:1;padding:14px 16px calc(100px + var(--safe-bottom));}
.pull-indicator{
  display:flex;align-items:center;justify-content:center;
  height:0;overflow:hidden;color:var(--ink-soft);font-size:13px;font-weight:600;
  transition:height .15s;
}
  .grid{display:grid;grid-template-columns:1fr;gap:12px;}
  @media (min-width:680px){ .grid{grid-template-columns:repeat(2,1fr);} }
  @media (min-width:1000px){ .grid{grid-template-columns:repeat(3,1fr);} }

  .card{
    background:var(--bg-elevated);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;display:flex;gap:0;
  }

  .card-body{flex:1;padding:12px 14px;min-width:0;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card-vendor{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .card-code{font-size:15px;font-weight:700;letter-spacing:0;margin-top:2px;line-height:1.2;}
  .card-cat{
    font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
    color:var(--accent);background:var(--accent-soft);padding:3px 7px;border-radius:5px;white-space:nowrap;
  }
  .card-meta{display:flex;gap:8px;margin-top:6px;flex-wrap:nowrap;align-items:center;overflow:hidden;}
  .meta-item{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:3px;}
  .meta-item b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;font-size:12px;}
  .card-sync{margin-top:8px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;}
  .card-sync.pending{color:var(--warn);}
  .card-sync.synced{color:var(--ok);}

  /* 선택 모드 */
  .card.selected{border:2px solid var(--accent);background:var(--accent-soft);}
  .select-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:25;
    background:var(--bg-elevated);border-top:1px solid var(--line);
    padding:12px 16px calc(12px + var(--safe-bottom));
    display:flex;gap:8px;align-items:center;
  }
  .select-bar-btn{
    flex:1;padding:10px 4px;border-radius:10px;border:1px solid var(--line);
    background:var(--bg-elevated);font-size:13px;font-weight:700;color:var(--ink);
  }
  .select-bar-btn.danger{background:#FBF1EB;color:var(--warn);border-color:#F0CFC0;}
  .select-bar-btn.accent{background:var(--ink);color:#fff;border-color:var(--ink);}
  .status-dropdown{
    position:fixed;bottom:calc(70px + var(--safe-bottom));left:16px;right:16px;z-index:26;
    background:var(--bg-elevated);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;box-shadow:0 -4px 20px rgba(0,0,0,0.12);
  }
  .status-dropdown-item{
    width:100%;padding:14px 16px;border:none;background:none;font-size:15px;font-weight:600;
    text-align:left;border-bottom:1px solid var(--line);color:var(--ink);
  }
  .status-dropdown-item:last-child{border-bottom:none;}

  /* 상태 뱃지 */
  .status-badge{
    font-size:10px;font-weight:700;letter-spacing:0.06em;
    color:var(--accent);padding:3px 7px;border-radius:5px;white-space:nowrap;
    display:inline-block;
  }
  .status-대기{background:#F0F0EE;color:#6B6358;}
  .status-보류{background:#FEF3C7;color:#B45309;}
  .status-확정{background:#D1FAE5;color:#065F46;}
  .status-탈락{background:#FEE2E2;color:#991B1B;}

  /* 상태 선택 세그먼트 (상세화면) */
  .status-segment{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .status-seg-btn{
    flex:1;min-width:60px;padding:9px 4px;border-radius:10px;font-size:13px;font-weight:700;
    border:1.5px solid var(--line);background:var(--bg-elevated);color:var(--ink-soft);
    cursor:pointer;text-align:center;
  }
  .status-seg-btn.active-대기{background:#F0E8DC;color:#8B6F4E;border-color:#8B6F4E;}
  .status-seg-btn.active-보류{background:#FEF3C7;color:#B45309;border-color:#B45309;}
  .status-seg-btn.active-확정{background:#D1FAE5;color:#065F46;border-color:#065F46;}
  .status-seg-btn.active-탈락{background:#FEE2E2;color:#991B1B;border-color:#991B1B;}

  /* 사진 3:4 비율 */
  .card-thumb{
    width:90px;min-width:90px;background:var(--accent-soft);
    display:flex;align-items:stretch;justify-content:center;overflow:hidden;
    aspect-ratio:3/4;align-self:stretch;
  }
  .card-thumb img{width:100%;height:100%;object-fit:cover;}
  .card-thumb-empty{color:var(--accent);font-size:11px;font-weight:600;text-align:center;padding:8px;align-self:center;}

  /* 폼 사진 3:4 */
  .photo-thumb{
    width:80px;height:107px;border-radius:10px;overflow:hidden;position:relative;background:var(--accent-soft);
    touch-action:none;
  }
  .photo-thumb img{width:100%;height:100%;object-fit:cover;}
  .photo-thumb.dragging{opacity:0.35;border:2px dashed var(--accent);transform:scale(0.95);}
  .photo-remove{
    position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;
    background:rgba(0,0,0,0.55);color:#fff;border:none;font-size:13px;line-height:1;
    display:flex;align-items:center;justify-content:center;
  }
  .photo-thumb.drag-over{border:2.5px solid var(--ok);box-shadow:0 0 0 3px var(--ok-soft);transform:scale(1.05);}
  .photo-add{
    width:80px;height:107px;border-radius:10px;border:1.5px dashed var(--line);
    background:none;color:var(--ink-soft);font-size:22px;display:flex;align-items:center;justify-content:center;
  }

  /* 상세 사진 갤러리 3:4 */
  .detail-photos{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:4px;}
  .photo-viewer{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;}
  .photo-viewer-img{max-width:100%;max-height:100%;object-fit:contain;touch-action:none;transition:transform .2s cubic-bezier(.32,.72,0,1);}
  .photo-viewer-close{position:fixed;top:calc(20px + var(--safe-top));right:20px;z-index:101;color:#fff;font-size:28px;background:none;border:none;}
  .photo-viewer-prev,.photo-viewer-next{position:fixed;top:50%;transform:translateY(-50%);z-index:101;color:#fff;font-size:32px;background:none;border:none;padding:20px;}
  .photo-viewer-prev{left:0;}
  .photo-viewer-next{right:0;}
  .photo-viewer-counter{position:fixed;bottom:calc(30px + var(--safe-bottom));left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:600;}
  .detail-photos img{
    width:160px;height:213px;object-fit:cover;border-radius:12px;flex-shrink:0;
  }

  .empty-state{
    text-align:center;padding:80px 24px;color:var(--ink-soft);
  }
  .empty-state-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:6px;}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:20px;bottom:calc(24px + var(--safe-bottom));z-index:30;
    width:60px;height:60px;border-radius:50%;background:var(--ink);color:#fff;border:none;
    font-size:30px;font-weight:300;display:flex;align-items:center;justify-content:center;
    line-height:1;padding:0;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  .fab:active{transform:scale(0.94);}

  /* ---------- FORM SHEET ---------- */
  .sheet-backdrop{
    position:fixed;inset:0;background:rgba(20,18,15,0.4);z-index:50;
    opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .sheet-backdrop.open{opacity:1;pointer-events:auto;}
  .sheet{
    position:fixed;inset:0;z-index:51;background:var(--bg);
    display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);
  }
  .sheet.open{transform:translateY(0);}
  .sheet-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(14px + var(--safe-top)) 16px 14px;border-bottom:1px solid var(--line);
    background:var(--bg-elevated);
  }
  .sheet-title{font-size:17px;font-weight:700;}
  .sheet-btn{border:none;background:none;font-size:16px;font-weight:600;padding:6px 4px;}
  .sheet-btn.cancel{color:var(--ink-soft);}
  .sheet-btn.save{color:var(--accent);}
  .sheet-body{flex:1;overflow-y:auto;padding:18px 16px calc(40px + var(--safe-bottom));}

  .field-group{margin-bottom:22px;}
  .field-group-label{
    font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--accent);margin-bottom:10px;
  }
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:5px;font-weight:600;}
  .field input,.field select,.field textarea{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;
    background:var(--bg-elevated);color:var(--ink);outline:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:80px;font-family:inherit;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .cat-select{display:flex;gap:8px;}
  .cat-btn{
    flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--bg-elevated);
    font-size:13px;font-weight:600;color:var(--ink-soft);
  }
  .cat-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  /* photo picker */
  .photo-row{display:flex;gap:8px;flex-wrap:wrap;}

  .delete-btn{
    width:100%;padding:13px;margin-top:8px;border-radius:10px;border:1px solid #F0CFC0;
    background:#FBF1EB;color:var(--warn);font-weight:700;font-size:14px;
  }

  /* ---------- DETAIL VIEW ---------- */
  .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);}
  .detail-row:last-child{border-bottom:none;}
  .detail-label{font-size:13px;color:var(--ink-soft);}
  .detail-value{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right;}
  .detail-memo{
    background:var(--accent-soft);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.5;margin-top:14px;
  }

  .toast{
    position:fixed;left:50%;bottom:calc(100px + var(--safe-bottom));transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;
    z-index:100;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
/* ============== CONFIG ============== */
const SUPABASE_URL = "https://ykxdsavvfngidltiprkz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlreGRzYXZ2Zm5naWRsdGlwcmt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTg5OTksImV4cCI6MjA5ODM5NDk5OX0.Qtbod7Q6Eln96HHOfXyA_puPeHo-2HfnMW8CtIIOtA0";
const TEAM_PIN = "7022"; // 필요시 변경
const TABLE = "product_candidates";
const BUCKET = "photos";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage }
});

/* ============== INDEXEDDB (offline store) ============== */
const DB_NAME = "sourcing_offline_db";
const DB_VERSION = 1;
let db;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e)=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains("items")){
        d.createObjectStore("items",{keyPath:"local_id"});
      }
    };
    req.onsuccess = ()=>{ db = req.result; resolve(db); };
    req.onerror = ()=>reject(req.error);
  });
}
function dbPut(item){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("items","readwrite");
    tx.objectStore("items").put(item);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
function dbDelete(local_id){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("items","readwrite");
    tx.objectStore("items").delete(local_id);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
function dbGetAll(){
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("items","readonly");
    const req = tx.objectStore("items").getAll();
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}

/* ============== STATE ============== */
let state = {
  authed: sessionStorage.getItem("authed") === "1",
  pinInput: "",
  pinError: "",
  items: [],
  search: "",
  catFilter: "전체",
  statusFilter: "전체",
  filtersOpen: false,
  sheetOpen: false,
  editingItem: null, // null = closed, object = editing/creating
  detailItem: null,
  syncing: false,
  trashOpen: false,
  photoViewer: null,
  session: null,
  isAdmin: false,
  loginModalOpen: false,
  loginEmail: "",
  loginPassword: "",
  loginError: "",
  loginLoading: false,
  draftModalOpen: false,
  selectMode: false,
  selectedIds: [],
  statusDropdownOpen: false,
};

const CATS = ["다운"];
const STATUSES = ["대기","보류","확정","탈락"];

function uid(){ return 'l_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ============== RENDER ROOT ============== */
function render(){
  const app = document.getElementById("app");
  if(!state.authed){
    app.innerHTML = renderPin();
    bindPin();
    return;
  }
  app.innerHTML = renderMain();
  bindMain();
}

/* ============== PIN SCREEN ============== */
function renderPin(){
  const dots = Array.from({length:4}).map((_,i)=>
    `<div class="pin-dot ${i < state.pinInput.length ? 'filled':''}"></div>`
  ).join("");
  const keys = [1,2,3,4,5,6,7,8,9,'','0','del'];
  const keysHtml = keys.map(k=>{
    if(k==='') return `<div></div>`;
    if(k==='del') return `<button class="pin-key ghost" data-key="del">⌫</button>`;
    return `<button class="pin-key" data-key="${k}">${k}</button>`;
  }).join("");
  return `

function bindPin(){
  document.querySelectorAll(".pin-key").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const k = btn.dataset.key;
      if(k === "del"){
        state.pinInput = state.pinInput.slice(0,-1);
        state.pinError = "";
      } else if(state.pinInput.length < 4){
        state.pinInput += k;
        state.pinError = "";
      }
      if(state.pinInput.length === 4){
        if(state.pinInput === TEAM_PIN){
          state.authed = true;
          sessionStorage.setItem("authed","1");
          state.pinInput = "";
          init();
        } else {
          state.pinError = "PIN이 올바르지 않습니다";
          setTimeout(()=>{ state.pinInput=""; render(); }, 500);
        }
      }
      render();
    });
  });
}

/* ============== MAIN SCREEN ============== */
function pendingCount(){ return state.items.filter(i=>!i.synced).length; }

function filteredItems(){
  let list = [...state.items].filter(i=>!i.deleted_at).sort((a,b)=> (b.created_at||'').localeCompare(a.created_at||''));
  if(state.catFilter !== "전체"){
    list = list.filter(i=>i.카테고리 === state.catFilter);
  }
  if(state.statusFilter !== "전체"){
    list = list.filter(i=>(i.상태||"대기") === state.statusFilter);
  }
  if(state.search.trim()){
    const q = state.search.trim().toLowerCase();
    list = list.filter(i=>
      (i.상품코드||'').toLowerCase().includes(q) ||
      (i.거래처명||'').toLowerCase().includes(q) ||
      (i.컬러||'').toLowerCase().includes(q) ||
      (i.원단소재명||'').toLowerCase().includes(q) ||
      (i.충전재종류||'').toLowerCase().includes(q)
    );
  }
  return list;
}

function emptyStateHtml(){
  const messages = {
    "전체": { title: "아직 등록된 상품이 없습니다", sub: "오른쪽 아래 + 버튼으로 첫 상품을 등록해보세요" },
    "대기": { title: "아직 등록된 상품이 없습니다", sub: "오른쪽 아래 + 버튼으로 첫 상품을 등록해보세요" },
    "보류": { title: "보류중인 상품이 없습니다", sub: "" },
    "확정": { title: "확정된 상품이 없습니다", sub: "" },
    "탈락": { title: "탈락된 상품이 없습니다", sub: "" },
  };
  const msg = messages[state.statusFilter] || messages["전체"];
  return `
    <div class="empty-state">
      <div class="empty-state-title">${msg.title}</div>
      ${msg.sub ? `<div>${msg.sub}</div>` : ''}
    </div>
  `;
}

function cardHtml(item){
  const photo = (item.local_photos && item.local_photos[0]) ? item.local_photos[0] : null;
  const syncClass = item.synced ? 'synced' : 'pending';
  const syncLabel = item.synced ? '동기화됨' : '대기중';
  return `
    <div class="card ${state.selectMode && state.selectedIds.includes(item.local_id) ? 'selected' : ''}" data-id="${item.local_id}">
      <div class="card-thumb">
        ${photo ? `<img src="${photo}">` : `<div class="card-thumb-empty">사진<br>없음</div>`}
      </div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-vendor">${escapeHtml(item.거래처명||'거래처 미입력')}</div>
            <div class="card-code">${escapeHtml(item.상품코드||'코드 미입력')}</div>
          </div>
          <div style="display:flex;align-items:center;gap:5px;">
            <div class="card-cat">${escapeHtml(item.카테고리||'기타')}</div>
            <span class="status-badge status-${item.상태||'대기'}">${item.상태||'대기'}</span>
          </div>
        </div>
        <div class="card-meta" style="min-height:18px;">
          ${item.컬러 ? `<div class="meta-item"><b>${escapeHtml(item.컬러)}</b></div>` : ''}
        </div>
        <div style="display:flex;gap:5px;flex-wrap:nowrap;overflow:hidden;min-height:28px;align-items:center;margin-top:4px;">
          ${item.원가위안 ? `<div style="padding:3px 7px;border-radius:6px;border:1px solid var(--line);background:var(--bg);font-size:11px;font-weight:600;white-space:nowrap;">¥${escapeHtml(item.원가위안)}${item.최소오더수량?`·${escapeHtml(item.최소오더수량)}`:''}</div>` : ''}
          ${item.원가위안2 ? `<div style="padding:3px 7px;border-radius:6px;border:1px solid var(--line);background:var(--bg);font-size:11px;font-weight:600;white-space:nowrap;">¥${escapeHtml(item.원가위안2)}${item.최소오더수량2?`·${escapeHtml(item.최소오더수량2)}`:''}</div>` : ''}
          ${item.원가위안3 ? `<div style="padding:3px 7px;border-radius:6px;border:1px solid var(--line);background:var(--bg);font-size:11px;font-weight:600;white-space:nowrap;">¥${escapeHtml(item.원가위안3)}${item.최소오더수량3?`·${escapeHtml(item.최소오더수량3)}`:''}</div>` : ''}
        </div>
        <div class="card-sync ${syncClass}">
          <span class="sync-dot"></span>${syncLabel}
        </div>
      </div>
    </div>
  `;
}

function bindMain(){
  document.getElementById("searchInput").addEventListener("input", (e)=>{
    state.search = e.target.value;
    renderListOnly();
  });
  document.getElementById("filterToggleBtn").addEventListener("click", ()=>{
    state.filtersOpen = !state.filtersOpen;
    render();
  });
  document.querySelectorAll(".chip[data-cat]").forEach(c=>{
    c.addEventListener("click", ()=>{
      state.catFilter = c.dataset.cat;
      render();
    });
  });
  document.querySelectorAll(".chip[data-status]").forEach(c=>{
    c.addEventListener("click", ()=>{
      state.statusFilter = c.dataset.status;
      render();
    });
  });
  const addBtn = document.getElementById("addBtn");
  if(addBtn) addBtn.addEventListener("click", openNewItem);
  document.getElementById("brandRefreshBtn").addEventListener("click", ()=>{
    location.reload();
  });
  document.getElementById("syncBtn").addEventListener("click", ()=>{
    if(!state.session){ openLoginModal(); return; }
    runSync();
  });
  const logoutBtn = document.getElementById("logoutBtn");
  if(logoutBtn) logoutBtn.addEventListener("click", doLogout);
  const trashFab = document.getElementById("trashFab");
  if(trashFab) trashFab.addEventListener("click", ()=>{ state.trashOpen = true; render(); });
  document.getElementById("selectModeBtn").addEventListener("click", ()=>{
    state.selectMode = !state.selectMode;
    state.selectedIds = [];
    state.statusDropdownOpen = false;
    render();
  });
  document.querySelectorAll(".card").forEach(c=>{
    c.addEventListener("click", ()=>{
      if(state.selectMode){
        const id = c.dataset.id;
        if(state.selectedIds.includes(id)){
          state.selectedIds = state.selectedIds.filter(i=>i !== id);
        } else {
          state.selectedIds.push(id);
        }
        render(); return;
      }
      const item = state.items.find(i=>i.local_id === c.dataset.id);
      state.detailItem = item;
      render();
    });
  });
}

function yuanToKrw(yuan){
  const n = Number(yuan);
  if(!yuan || isNaN(n)) return null;
  return Math.round(n * 1.1 * 190);
}

// compress to keep local storage manageable
function fileToCompressedDataUrl(file, maxDim=1280, quality=0.72){
  return new Promise((resolve)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e)=>{
      img.onload = ()=>{
        let {width,height} = img;
        if(width > height && width > maxDim){ height = height*maxDim/width; width = maxDim; }
        else if(height > maxDim){ width = width*maxDim/height; height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ============== SYNC TO SUPABASE ============== */
async function runSync(){
  if(state.syncing) return;
  if(!navigator.onLine){ toast("오프라인 상태입니다. 인터넷 연결 후 다시 시도하세요"); return; }
  if(!state.session){ openLoginModal(); return; }
  const pending = state.items.filter(i=>!i.synced);
  state.syncing = true;
  render();

  let successCount = 0, failCount = 0;

  for(const item of pending){
    try{
      // upload photos first
      const photoUrls = [];
      for(let i=0;i<(item.local_photos||[]).length;i++){
        const dataUrl = item.local_photos[i];
        const blob = await (await fetch(dataUrl)).blob();
        const path = `${item.local_id}/${i}.jpg`;
        const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
          method:"POST",
          headers:{
            "Authorization": `Bearer ${state.session?.access_token || SUPABASE_ANON_KEY}`,
            "apikey": SUPABASE_ANON_KEY,
            "Content-Type":"image/jpeg",
            "x-upsert":"true"
          },
          body: blob
        });
        if(uploadRes.ok || uploadRes.status===200 || uploadRes.status===201){
          photoUrls.push(`${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`);
        }
      }

      const payload = {
        카테고리: item.카테고리, 거래처명: item.거래처명, 상품코드: item.상품코드,
        충전재종류: item.충전재종류, 필파워: numOrNull(item.필파워),
        충전재중량: numOrNull(item.충전재중량), 완제품중량: numOrNull(item.완제품중량),
        원단소재명: item.원단소재명, 원단단가: numOrNull(item.원단단가),
        컬러: item.컬러, 
        원가위안: numOrNull(item.원가위안), 최소오더수량: numOrNull(item.최소오더수량),
        원가위안2: numOrNull(item.원가위안2), 최소오더수량2: numOrNull(item.최소오더수량2),
        원가위안3: numOrNull(item.원가위안3), 최소오더수량3: numOrNull(item.최소오더수량3),
        상태: item.상태 || '대기',
        메모: item.메모,
        사진url배열: photoUrls
      };

      let res;
      if(item.remote_id){
        res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${item.remote_id}`, {
          method:"PATCH",
          headers:{
            "Authorization": `Bearer ${state.session?.access_token || SUPABASE_ANON_KEY}`,
            "apikey": SUPABASE_ANON_KEY,
            "Content-Type":"application/json",
            "Prefer":"return=representation"
          },
          body: JSON.stringify(payload)
        });
      } else {
        res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
          method:"POST",
          headers:{
            "Authorization": `Bearer ${state.session?.access_token || SUPABASE_ANON_KEY}`,
            "apikey": SUPABASE_ANON_KEY,
            "Content-Type":"application/json",
            "Prefer":"return=representation"
          },
          body: JSON.stringify(payload)
        });
      }

      if(res.ok){
        const data = await res.json();
        item.synced = true;
        item.remote_id = data[0]?.id || item.remote_id;
        await dbPut(item);
        successCount++;
      } else {
        failCount++;
      }
    } catch(err){
      failCount++;
    }
  }

  // PULL: 서버 전체 데이터 받아오기
  try{
    const pullRes = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&deleted_at=is.null`, {
      headers:{
        "Authorization": `Bearer ${state.session?.access_token || SUPABASE_ANON_KEY}`,
        "apikey": SUPABASE_ANON_KEY
      }
    });
    if(pullRes.ok){
      const rows = await pullRes.json();
      for(const row of rows){
        const existing = state.items.find(i=>i.remote_id === row.id);
        if(existing && !existing.synced) continue; // 로컬에 미동기화 변경사항 있으면 덮지 않음
        const mapped = {
          local_id: existing ? existing.local_id : uid(),
          remote_id: row.id,
          created_by: row.created_by,
          카테고리: row.카테고리, 거래처명: row.거래처명, 상품코드: row.상품코드,
          충전재종류: row.충전재종류, 필파워: row.필파워,
          충전재중량: row.충전재중량, 완제품중량: row.완제품중량,
          원단소재명: row.원단소재명, 원단단가: row.원단단가,
          컬러: row.컬러, 
          원가위안: row.원가위안, 최소오더수량: row.최소오더수량,
          원가위안2: row.원가위안2, 최소오더수량2: row.최소오더수량2,
          원가위안3: row.원가위안3, 최소오더수량3: row.최소오더수량3,
          상태: row.상태||'대기', 메모: row.메모,
          local_photos: row.사진url배열||[],
          사진url배열_existing: row.사진url배열||[],
          synced: true,
          created_at: row.created_at,
        };
        await dbPut(mapped);
        const idx = state.items.findIndex(i=>i.remote_id === row.id);
        if(idx >= 0) state.items[idx] = mapped;
        else state.items.push(mapped);
      }
    }
  } catch(e){ console.error("pull 실패:", e); }

  // PULL: 서버 전체 데이터 받아오기
  try{
    const pullRes = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*`, {
      headers:{
        "Authorization": `Bearer ${state.session?.access_token || SUPABASE_ANON_KEY}`,
        "apikey": SUPABASE_ANON_KEY
      }
    });
    if(pullRes.ok){
      const rows = await pullRes.json();
      for(const row of rows){
        if(row.deleted_at) continue;
        const existing = state.items.find(i=>i.remote_id === row.id);
        if(existing && !existing.synced) continue;
        const mapped = {
          local_id: existing ? existing.local_id : uid(),
          remote_id: row.id,
          created_by: row.created_by,
          카테고리: row.카테고리, 거래처명: row.거래처명, 상품코드: row.상품코드,
          충전재종류: row.충전재종류, 필파워: row.필파워,
          충전재중량: row.충전재중량, 완제품중량: row.완제품중량,
          원단소재명: row.원단소재명, 원단단가: row.원단단가,
          컬러: row.컬러,
          원가위안: row.원가위안, 최소오더수량: row.최소오더수량,
          원가위안2: row.원가위안2, 최소오더수량2: row.최소오더수량2,
          원가위안3: row.원가위안3, 최소오더수량3: row.최소오더수량3,
          상태: row.상태||'대기', 메모: row.메모,
          local_photos: row.사진url배열||[],
          사진url배열_existing: row.사진url배열||[],
          synced: true,
          created_at: row.created_at,
        };
        await dbPut(mapped);
        const idx = state.items.findIndex(i=>i.remote_id === row.id);
        if(idx >= 0) state.items[idx] = mapped;
        else state.items.push(mapped);
      }
    }
  } catch(e){ console.error("pull 실패:", e); }

  state.syncing = false;
  render();
  if(failCount===0){
    toast(`전체 데이터 갱신 완료${successCount > 0 ? ` (${successCount}건 업로드)` : ''}`);
  } else {
    toast(`${successCount}건 성공, ${failCount}건 실패`);
  }
}

function numOrNull(v){
  if(v === "" || v === null || v === undefined) return null;
  const n = Number(v);
  return isNaN(n) ? null : n;
}

/* ============== UTIL ============== */
function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

/* ============== 사진 드래그 순서변경 ============== */
function setupPhotoDrag(){
  const row = document.getElementById("photoSortRow");
  if(!row) return;
  let dragIdx = null;
  let overIdx = null;

  row.querySelectorAll(".photo-thumb").forEach((thumb, idx)=>{
    thumb.setAttribute("draggable", true);
    thumb.dataset.idx = idx;

    // 마우스/터치 드래그
    thumb.addEventListener("dragstart", ()=>{ dragIdx = idx; thumb.classList.add("dragging"); });
    thumb.addEventListener("dragend", ()=>{ thumb.classList.remove("dragging"); dragIdx = null; });
    thumb.addEventListener("dragover", (e)=>{ 
      e.preventDefault(); 
      overIdx = idx;
      row.querySelectorAll(".photo-thumb").forEach(t=>t.classList.remove("drag-over"));
      thumb.classList.add("drag-over");
    });
    thumb.addEventListener("dragleave", ()=>{ thumb.classList.remove("drag-over"); });
    thumb.addEventListener("drop", ()=>{
      row.querySelectorAll(".photo-thumb").forEach(t=>t.classList.remove("drag-over"));
      if(dragIdx !== null && overIdx !== null && dragIdx !== overIdx){
        const photos = [...state.editingItem.local_photos];
        const moved = photos.splice(dragIdx, 1)[0];
        photos.splice(overIdx, 0, moved);
        state.editingItem.local_photos = photos;
        render();
      }
    });

    // 터치 드래그 (모바일/아이패드)
    let touchTimer = null;
    let touchStartIdx = null;
    thumb.addEventListener("touchstart", (e)=>{
      touchStartIdx = idx;
      touchTimer = setTimeout(()=>{
        thumb.classList.add("dragging");
        dragIdx = idx;
      }, 400);
    }, {passive:true});
    thumb.addEventListener("touchend", ()=>{
      clearTimeout(touchTimer);
      if(dragIdx !== null && overIdx !== null && dragIdx !== overIdx){
        const photos = [...state.editingItem.local_photos];
        const moved = photos.splice(dragIdx, 1)[0];
        photos.splice(overIdx, 0, moved);
        state.editingItem.local_photos = photos;
        render();
      }
      thumb.classList.remove("dragging");
      dragIdx = null;
    });
    thumb.addEventListener("touchmove", (e)=>{
      if(dragIdx === null) return;
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const targetThumb = el?.closest(".photo-thumb");
      if(targetThumb){
        overIdx = parseInt(targetThumb.dataset.idx);
        row.querySelectorAll(".photo-thumb").forEach(t=>t.classList.remove("drag-over"));
        targetThumb.classList.add("drag-over");
      }
    }, {passive:true});
  });
}

/* ============== 왼→오 스와이프 뒤로가기 ============== */
function setupSwipeBack(){
  let startX = 0, startY = 0, swiping = false;
  const getSheet = ()=> document.querySelector(".sheet.open");

  document.addEventListener("touchstart", (e)=>{
    if(!state.detailItem && !state.sheetOpen && !state.trashOpen) return;
    if(e.touches[0].clientX > 60) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
    const sheet = getSheet();
    if(sheet) sheet.style.transition = "none";
  }, {passive:true});

  document.addEventListener("touchmove", (e)=>{
    if(!swiping) return;
    const dx = e.touches[0].clientX - startX;
    const dy = Math.abs(e.touches[0].clientY - startY);
    if(dy > dx) { swiping = false; return; }
    if(dx < 0) return;
    const sheet = getSheet();
    if(sheet) sheet.style.transform = `translateX(${dx}px)`;
  }, {passive:true});

  document.addEventListener("touchend", (e)=>{
    if(!swiping){ swiping = false; return; }
    swiping = false;
    const dx = e.changedTouches[0].clientX - startX;
    const sheet = getSheet();
    if(dx > 80){
      if(sheet){
        sheet.style.transition = "transform .25s cubic-bezier(.32,.72,0,1)";
        sheet.style.transform = "translateX(100%)";
        setTimeout(()=>{
          if(state.trashOpen){ state.trashOpen = false; }
          else if(state.sheetOpen){ state.sheetOpen = false; state.editingItem = null; }
          else if(state.detailItem){ state.detailItem = null; }
          render();
        }, 220);
      }
    } else {
      if(sheet){
        sheet.style.transition = "transform .2s cubic-bezier(.32,.72,0,1)";
        sheet.style.transform = "translateX(0)";
      }
    }
  }, {passive:true});
}

        </div>
      </div>`;
  }).join("") : `<div style="text-align:center;padding:60px 24px;color:var(--ink-soft);">휴지통이 비어있습니다</div>`;
  return `
  <div class="sheet-backdrop open" id="trashBackdrop"></div>
  <div class="sheet open" id="trashEl">
    <div class="sheet-header">
      <button class="sheet-btn cancel" id="trashClose">닫기</button>
      <div class="sheet-title">🗑 휴지통</div>
      <div style="width:40px;"></div>
    </div>
    <div class="sheet-body">${rowsHtml}</div>

function bindTrashSheet(){
  document.getElementById("trashClose").addEventListener("click", ()=>{ state.trashOpen = false; render(); });
  document.getElementById("trashBackdrop").addEventListener("click", ()=>{ state.trashOpen = false; render(); });
  document.querySelectorAll(".trash-restore").forEach(b=>{
    b.addEventListener("click", async ()=>{
      const item = state.items.find(i=>i.local_id === b.dataset.id);
      if(!item) return;
      delete item.deleted_at;
      item.synced = false;
      await dbPut(item);
      render(); toast("복구되었습니다");
    });
  });
  document.querySelectorAll(".trash-perm").forEach(b=>{
    b.addEventListener("click", async ()=>{
      if(!confirm("완전히 삭제할까요? 복구할 수 없습니다.")) return;
      const item = state.items.find(i=>i.local_id === b.dataset.id);
      if(!item) return;
      // Storage 사진 삭제
      if(item.사진url배열_existing?.length){
        for(const url of item.사진url배열_existing){
          const path = url.split(`/storage/v1/object/public/${BUCKET}/`)[1];
          if(path){
            await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
              method:"DELETE",
              headers:{
                "Authorization":`Bearer ${SUPABASE_ANON_KEY}`,
                "apikey":SUPABASE_ANON_KEY
              }
            });
          }
        }
      }
      // Supabase 테이블 삭제
      if(item.remote_id){
        await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${item.remote_id}`, {
          method:"DELETE",
          headers:{
            "Authorization":`Bearer ${SUPABASE_ANON_KEY}`,
            "apikey":SUPABASE_ANON_KEY
          }
        });
      }
      await dbDelete(item.local_id);
      state.items = state.items.filter(i=>i.local_id !== item.local_id);
      render(); toast("완전히 삭제되었습니다");
    });
  });
}

    <button class="photo-viewer-prev" id="pvPrev">‹</button>
    <button class="photo-viewer-next" id="pvNext">›</button>
    <div class="photo-viewer-counter">${idx+1} / ${photos.length}</div>
  </div>`;
}
function bindPhotoViewer(){
  const el = document.getElementById("photoViewerEl");
  document.getElementById("pvClose").addEventListener("click", ()=>{ state.photoViewer=null; render(); });
  const pvPrev = document.getElementById("pvPrev");
  const pvNext = document.getElementById("pvNext");
  if(pvPrev) pvPrev.addEventListener("click", ()=>{ 
    const {idx, photos} = state.photoViewer;
    const newIdx = idx > 0 ? idx-1 : photos.length-1;
    state.photoViewer.idx = newIdx;
    const track = document.getElementById("pvTrack");
    if(track){ track.style.transition="transform .25s cubic-bezier(.32,.72,0,1)"; track.style.transform=`translateX(${-newIdx*100}%)`; }
    setTimeout(()=>render(), 260);
  });
  if(pvNext) pvNext.addEventListener("click", ()=>{ 
    const {idx, photos} = state.photoViewer;
    let newIdx = idx < photos.length-1 ? idx+1 : 0;
    if(idx === photos.length-1) toast("마지막 사진입니다");
    state.photoViewer.idx = newIdx;
    const track = document.getElementById("pvTrack");
    if(track){ track.style.transition="transform .25s cubic-bezier(.32,.72,0,1)"; track.style.transform=`translateX(${-newIdx*100}%)`; }
    setTimeout(()=>render(), 260);
  });

  // 슬라이더 스와이프
  let startX = 0, currentX = 0, isDragging = false;
  const threshold = 0.3; // 30% 이상 당기면 넘어감

  el.addEventListener("touchstart", (e)=>{
    if(e.touches.length !== 1 || scale > 1.05) return;
    startX = e.touches[0].clientX;
    isDragging = true;
    const track = document.getElementById("pvTrack");
    if(track) track.style.transition = "none";
  }, {passive:true});

  el.addEventListener("touchmove", (e)=>{
    if(!isDragging || e.touches.length !== 1 || scale > 1.05) return;
    currentX = e.touches[0].clientX;
    const dx = currentX - startX;
    const {idx, photos} = state.photoViewer;
    const track = document.getElementById("pvTrack");
    if(track) track.style.transform = `translateX(calc(${-idx*100}% + ${dx}px))`;
  }, {passive:true});

  el.addEventListener("touchend", (e)=>{
    if(!isDragging) return;
    isDragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const {idx, photos} = state.photoViewer;
    const screenW = window.innerWidth;
    const track = document.getElementById("pvTrack");

    let newIdx = idx;
    if(dx < -(screenW * threshold)){
      newIdx = idx < photos.length-1 ? idx+1 : 0;
      if(newIdx === photos.length-1) toast("마지막 사진입니다");
    } else if(dx > (screenW * threshold)){
      newIdx = idx > 0 ? idx-1 : photos.length-1;
    }

    state.photoViewer.idx = newIdx;
    if(track){
      track.style.transition = "transform .25s cubic-bezier(.32,.72,0,1)";
      track.style.transform = `translateX(${-newIdx*100}%)`;
    }
    setTimeout(()=>render(), 260);
  }, {passive:true});

  // 핀치줌
  const img = document.getElementById("pvImg");
  let scale = 1, lastDist = 0;
  el.addEventListener("touchstart", (e)=>{
    if(e.touches.length === 2){
      lastDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    }
  }, {passive:true});
  el.addEventListener("touchmove", (e)=>{
    if(e.touches.length === 2){
      const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      scale *= dist/lastDist;
      scale = Math.min(Math.max(scale, 1), 4);
      img.style.transform = `scale(${scale})`;
      lastDist = dist;
    }
  }, {passive:true});
  el.addEventListener("touchend", (e)=>{
    if(e.touches.length < 2 && scale <= 1.05){ scale=1; img.style.transform='scale(1)'; }
  }, {passive:true});
}

/* ============== 사진 ZIP 내보내기 ============== */
async function exportPhotosZip(items){
  toast("ZIP 만드는 중... 잠시만요 ⏳");
  const zip = new JSZip();

  for(const item of items){
    const vendor = (item.거래처명||'미입력').replace(/[\/\\?%*:|"<>]/g, '_');
    const code = (item.상품코드||'미입력').replace(/[\/\\?%*:|"<>]/g, '_');
    const photos = item.local_photos || [];

    for(let i=0; i<photos.length; i++){
      const photo = photos[i];
      const fileName = `${vendor}/사진/${vendor}_${code}_${i+1}.jpg`;
      try{
        if(photo.startsWith("data:")){
          const base64 = photo.split(",")[1];
          zip.file(fileName, base64, {base64: true});
        } else {
          const res = await fetch(photo);
          const blob = await res.blob();
          zip.file(fileName, blob);
        }
      } catch(e){ console.error("사진 다운로드 실패:", fileName, e); }
    }
  }

  const content = await zip.generateAsync({type:"blob"});
  const url = URL.createObjectURL(content);
  const a = document.createElement("a");
  a.href = url;
  const date = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','');
  a.download = `셀렉트노트_${date}.zip`;
  a.click();
  URL.revokeObjectURL(url);
  toast("✅ 다운로드 완료!");
}

/* ============== PULL TO REFRESH ============== */
function setupPullToRefresh(){
  let startY = 0, pulling = false;
  const threshold = 70;

  document.addEventListener("touchstart", (e)=>{
    if(window.scrollY === 0 && state.authed && !state.sheetOpen && !state.detailItem){
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, {passive:true});

  document.addEventListener("touchmove", (e)=>{
    if(!pulling) return;
    const diff = e.touches[0].clientY - startY;
    if(diff > threshold){
      pulling = false;
      location.reload();
    }
  }, {passive:true});

  document.addEventListener("touchend", ()=>{
    pulling = false;
  });
}

/* ============== INIT ============== */
async function init(){
  await openDB();
  state.items = await dbGetAll();
  await restoreSession();
  render();
  if(state.session && navigator.onLine) runSync();
  window.addEventListener("online", ()=>render());
  window.addEventListener("offline", ()=>render());
  setupPullToRefresh();
  setupSwipeBack();
}

// patch render to bind sheet listeners after DOM update
const _origRender = render;
render = function(){
  _origRender();
  if(state.authed && state.sheetOpen) bindFormSheet();
  if(state.authed && state.detailItem) bindDetailSheet();
  if(state.authed && state.trashOpen) bindTrashSheet();
  if(state.authed && state.photoViewer) bindPhotoViewer();
  if(state.authed && state.loginModalOpen) bindLoginModal();
  if(state.authed && state.selectMode) bindSelectBar();
};

init();
